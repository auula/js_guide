<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document Set Cookie Example</title>
</head>

<body>
    <script>
        class CookieBuilder {
            // 在 ES6 中不能私有化默认的构造器，那如何实现这个私有化构造器呢？
            static #SECRET = Symbol('CookieBuilder');
            // 默认构造器构造出来 的 CookieBuilder 对象，包含一个 parts 数组，用于存储构建 Cookie 的各个部分。
            constructor(secret, name, value) {
                if (secret !== CookieBuilder.#SECRET) {
                    throw new Error(
                        'Use CookieBuilder.create() instead'
                    );
                }

                this.parts = [
                    `${encodeURIComponent(name)}=${encodeURIComponent(value)}`
                ];
            }

            static of(name, value) {
                // 通过指定的静态工厂来完成 CookieBuilder 对象的构建，并且在工厂方法中对 name 和 value 进行校验，确保它们不为空。
                if (!name || !value) {
                    throw new Error("cookie name required");
                }

                return new CookieBuilder(CookieBuilder.#SECRET, name, value);
            }

            path(path) {
                this.parts.push(`path=${path}`);
                return this;
            }

            maxAge(seconds) {
                this.parts.push(`max-age=${seconds}`);
                return this;
            }

            secure() {
                this.parts.push(`secure`);
                return this;
            }

            sameSite(policy) {
                this.parts.push(`samesite=${policy}`);
                return this;
            }

            build() {
                return this.parts.join('; ');
            }

            apply() {
                document.cookie = this.build();
            }
        }

        for (let i = 0; i < 10; i++) {
            // 通过 CookieBuilder 类来构建一个 Cookie，并将其应用到 document.cookie 中
            CookieBuilder.of(`token-${i}`, `abc-${i}`)
                .path("/")
                .maxAge(3600)
                .secure()
                .apply();
        }

        // 这行代码会抛出错误，因为构造器是私有的，不能直接调用，
        // 通过 symbol 来实现私有化构造器，确保只能通过静态工厂方法来创建 CookieBuilder 对象，
        // 从而控制了对象的创建过程，并且可以在工厂方法中添加必要的校验逻辑。
        // new CookieBuilder(CookieBuilder.#SECRET, "invalid", "cookie"); 
        console.log(document.cookie); 
    </script>
</body>

</html>
